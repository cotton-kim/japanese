<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본어 문자 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1210;
    --paper: #f5f0e8;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gold: #c9952a;
    --sage: #5a7a5a;
    --mist: #8a9ba8;
    --card-bg: #fefcf7;
    --shadow: rgba(26,18,16,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper);
    min-height: 100vh;
    color: var(--ink);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(192,57,43,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(201,149,42,0.05) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  header { text-align: center; margin-bottom: 24px; }

  .title-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 0.1em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .title-kr {
    font-size: 0.85rem;
    color: var(--mist);
    letter-spacing: 0.15em;
    font-weight: 300;
    margin-bottom: 20px;
  }

  /* Page nav */
  .page-nav {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    overflow: hidden;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }

  .page-nav-btn {
    padding: 10px 32px;
    border: none;
    border-right: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .page-nav-btn:last-child { border-right: none; }
  .page-nav-btn:hover:not(.active) { background: rgba(26,18,16,0.06); }
  .page-nav-btn.active { background: var(--ink); color: var(--paper); }

  .page { display: none; }
  .page.active { display: block; animation: slideIn 0.3s ease; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
  }

  /* ── QUIZ styles ── */
  .mode-bar {
    display: flex; gap: 8px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 10px;
  }

  .mode-btn {
    padding: 8px 20px;
    border: 1.5px solid var(--ink);
    background: transparent; color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.2s; border-radius: 2px;
  }
  .mode-btn:hover { background: rgba(26,18,16,0.06); }
  .mode-btn.active { background: var(--ink); color: var(--paper); }

  .type-tabs {
    display: flex; gap: 6px; justify-content: center;
    margin-bottom: 20px; flex-wrap: wrap;
  }

  .type-tab {
    padding: 6px 14px;
    border: 1px solid rgba(26,18,16,0.2);
    background: transparent; color: var(--mist);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
    cursor: pointer; border-radius: 20px; transition: all 0.2s;
  }
  .type-tab.active { background: var(--red); border-color: var(--red); color: white; }
  .type-tab:hover:not(.active) { color: var(--ink); border-color: var(--ink); }

  .divider {
    text-align: center; color: rgba(26,18,16,0.2);
    font-size: 1.2rem; margin: 4px 0 20px; letter-spacing: 0.3em;
  }

  .score-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 18px; background: var(--card-bg);
    border: 1px solid rgba(26,18,16,0.1); border-radius: 4px;
    margin-bottom: 24px; box-shadow: 0 2px 8px var(--shadow);
  }
  .score-item { text-align: center; }
  .score-label {
    font-size: 0.65rem; color: var(--mist); letter-spacing: 0.12em;
    text-transform: uppercase; display: block; margin-bottom: 2px;
  }
  .score-value {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem; font-weight: 700; color: var(--ink);
  }
  .score-value.correct { color: var(--sage); }
  .score-value.wrong { color: var(--red); }

  .progress-wrap {
    height: 3px; background: rgba(26,18,16,0.1);
    border-radius: 2px; margin-bottom: 28px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--red);
    transition: width 0.4s ease; border-radius: 2px;
  }

  .streak {
    text-align: center; font-size: 0.75rem; color: var(--gold);
    font-weight: 600; letter-spacing: 0.1em;
    margin-top: -14px; margin-bottom: 14px; min-height: 18px;
  }

  .quiz-card {
    background: var(--card-bg); border: 1px solid rgba(26,18,16,0.12);
    border-radius: 6px; padding: 40px 30px 30px;
    box-shadow: 0 4px 24px var(--shadow), 0 1px 0 rgba(255,255,255,0.8) inset;
    margin-bottom: 20px; position: relative; animation: slideIn 0.3s ease;
  }
  .question-type {
    position: absolute; top: 14px; left: 18px;
    font-size: 0.65rem; color: var(--mist);
    letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
  }
  .question-num {
    position: absolute; top: 14px; right: 18px;
    font-size: 0.65rem; color: var(--mist); letter-spacing: 0.08em;
  }
  .kana-display {
    font-family: 'Noto Serif JP', serif; font-size: 6rem; font-weight: 300;
    text-align: center; color: var(--ink); line-height: 1; margin: 10px 0 32px;
    text-shadow: 2px 3px 0 rgba(26,18,16,0.06);
  }
  .kana-display.shake { animation: shake 0.4s ease; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-btn {
    padding: 14px 12px; border: 1.5px solid rgba(26,18,16,0.18);
    background: transparent; color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem; font-weight: 400; cursor: pointer;
    border-radius: 4px; transition: all 0.15s; letter-spacing: 0.05em;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--ink); background: rgba(26,18,16,0.04); }
  .option-btn.correct { background: var(--sage); border-color: var(--sage); color: white; font-weight: 600; }
  .option-btn.wrong { background: var(--red); border-color: var(--red); color: white; }
  .option-btn:disabled { cursor: default; }

  .input-wrap { display: flex; gap: 10px; margin-top: 8px; }
  .answer-input {
    flex: 1; padding: 12px 16px; border: 1.5px solid rgba(26,18,16,0.25);
    background: transparent; font-family: 'Noto Sans KR', sans-serif;
    font-size: 1.1rem; color: var(--ink); border-radius: 4px;
    outline: none; transition: border-color 0.2s; letter-spacing: 0.08em;
  }
  .answer-input:focus { border-color: var(--red); }
  .answer-input.correct { border-color: var(--sage); background: rgba(90,122,90,0.08); }
  .answer-input.wrong { border-color: var(--red); background: rgba(192,57,43,0.06); }

  .submit-btn {
    padding: 12px 24px; background: var(--ink); color: var(--paper);
    border: none; font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em;
    cursor: pointer; border-radius: 4px; transition: all 0.15s;
  }
  .submit-btn:hover { background: #2d2220; }

  .feedback {
    text-align: center; padding: 12px; font-size: 0.9rem; font-weight: 600;
    border-radius: 4px; margin-top: 12px; letter-spacing: 0.05em; display: none;
  }
  .feedback.show { display: block; animation: fadeIn 0.2s ease; }
  .feedback.correct-fb { color: var(--sage); background: rgba(90,122,90,0.1); }
  .feedback.wrong-fb { color: var(--red); background: rgba(192,57,43,0.08); }

  .word-card {
    display: none; margin-top: 14px; padding: 14px 18px;
    background: linear-gradient(135deg, rgba(90,122,90,0.08) 0%, rgba(201,149,42,0.06) 100%);
    border: 1px solid rgba(90,122,90,0.25); border-left: 3px solid var(--sage);
    border-radius: 4px; animation: fadeSlideUp 0.35s ease;
  }
  .word-card.show { display: block; }
  .word-card-label {
    font-size: 0.6rem; color: var(--sage); letter-spacing: 0.15em;
    text-transform: uppercase; font-weight: 700; margin-bottom: 8px;
  }
  .word-jp {
    font-family: 'Noto Serif JP', serif; font-size: 1.35rem; font-weight: 400;
    color: var(--ink); margin-bottom: 3px; letter-spacing: 0.05em;
  }
  .word-reading { font-size: 0.78rem; color: var(--mist); margin-bottom: 4px; letter-spacing: 0.06em; }
  .word-meaning { font-size: 0.9rem; font-weight: 600; color: var(--ink); }

  .next-btn {
    width: 100%; padding: 14px; background: var(--red); color: white; border: none;
    font-family: 'Noto Serif JP', serif; font-size: 1rem; font-weight: 400;
    letter-spacing: 0.1em; cursor: pointer; border-radius: 4px; margin-top: 16px;
    transition: all 0.2s; display: none;
  }
  .next-btn.show { display: block; animation: fadeIn 0.2s ease; }
  .next-btn:hover { background: var(--red-light); }

  .result-screen { display: none; text-align: center; padding: 50px 20px; }
  .result-screen.show { display: block; animation: slideIn 0.4s ease; }
  .result-kana { font-family: 'Noto Serif JP', serif; font-size: 4rem; color: var(--red); margin-bottom: 16px; }
  .result-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
  .result-score { font-family: 'Noto Serif JP', serif; font-size: 3.5rem; font-weight: 700; color: var(--ink); margin: 20px 0 8px; }
  .result-sub { font-size: 0.85rem; color: var(--mist); margin-bottom: 30px; }
  .restart-btn {
    padding: 14px 40px; background: var(--ink); color: var(--paper); border: none;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem; font-weight: 600;
    letter-spacing: 0.1em; cursor: pointer; border-radius: 4px; transition: all 0.2s;
  }
  .restart-btn:hover { background: #2d2220; transform: translateY(-1px); }

  /* ── CHART styles ── */
  .chart-toggle {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 24px;
  }
  .chart-toggle-btn {
    padding: 8px 24px; border: 1.5px solid var(--ink);
    background: transparent; color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em;
    cursor: pointer; border-radius: 2px; transition: all 0.2s;
  }
  .chart-toggle-btn:hover { background: rgba(26,18,16,0.06); }
  .chart-toggle-btn.active { background: var(--ink); color: var(--paper); }

  .chart-section { display: none; }
  .chart-section.active { display: block; animation: fadeIn 0.25s ease; }

  .chart-block {
    background: var(--card-bg); border: 1px solid rgba(26,18,16,0.1);
    border-radius: 6px; padding: 22px 18px;
    box-shadow: 0 2px 12px var(--shadow); margin-bottom: 18px;
  }
  .chart-block-title {
    font-size: 0.72rem; font-weight: 700; color: var(--mist);
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(26,18,16,0.08);
    display: flex; align-items: center; gap: 8px;
  }
  .chart-block-title .badge {
    background: var(--red); color: white; font-size: 0.6rem;
    padding: 2px 8px; border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.04em;
    font-weight: 600;
  }
  .chart-block-title .badge.sage { background: var(--sage); }
  .chart-block-title .badge.gold { background: var(--gold); }

  .kana-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
  }

  .kana-cell {
    background: white; border: 1px solid rgba(26,18,16,0.09);
    border-radius: 5px; padding: 10px 6px 8px;
    text-align: center; cursor: pointer; transition: all 0.18s;
    user-select: none;
  }
  .kana-cell:hover { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(192,57,43,0.18); }
  .kana-cell.dakuten { background: rgba(90,122,90,0.06); border-color: rgba(90,122,90,0.22); }
  .kana-cell.dakuten:hover { border-color: var(--sage); box-shadow: 0 4px 14px rgba(90,122,90,0.2); }
  .kana-cell.handakuten { background: rgba(201,149,42,0.07); border-color: rgba(201,149,42,0.25); }
  .kana-cell.handakuten:hover { border-color: var(--gold); box-shadow: 0 4px 14px rgba(201,149,42,0.2); }
  .kana-cell.empty { background: transparent; border: 1px dashed rgba(26,18,16,0.08); cursor: default; pointer-events: none; }

  .cell-kana {
    font-family: 'Noto Serif JP', serif; font-size: 1.55rem; font-weight: 300;
    color: var(--ink); line-height: 1; display: block; margin-bottom: 5px;
  }
  .cell-roma { font-size: 0.62rem; color: var(--mist); letter-spacing: 0.07em; display: block; }

  .chart-meta {
    display: flex; flex-wrap: wrap; gap: 14px;
    margin-bottom: 18px; align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--mist); }
  .legend-dot { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }
  .chart-tip { font-size: 0.72rem; color: var(--mist); letter-spacing: 0.04em; margin-left: auto; }

  /* Popup */
  .kana-popup {
    display: none; position: fixed; z-index: 200;
    background: var(--ink); color: var(--paper);
    border-radius: 8px; padding: 14px 18px; min-width: 170px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.28);
    pointer-events: none; animation: popIn 0.18s ease;
    transform-origin: center bottom;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88); }
    to { opacity: 1; transform: scale(1); }
  }
  .kana-popup.visible { display: block; }
  .popup-kana {
    font-family: 'Noto Serif JP', serif; font-size: 2.4rem; font-weight: 300;
    text-align: center; margin-bottom: 4px;
  }
  .popup-roma { font-size: 0.72rem; color: rgba(255,255,255,0.55); letter-spacing: 0.14em; text-align: center; margin-bottom: 10px; }
  .popup-hr { height: 1px; background: rgba(255,255,255,0.13); margin-bottom: 10px; }
  .popup-word { font-family: 'Noto Serif JP', serif; font-size: 1.05rem; margin-bottom: 3px; }
  .popup-reading { font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-bottom: 5px; letter-spacing: 0.06em; }
  .popup-meaning { font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.92); }

  @media (max-width: 500px) {
    .kana-display { font-size: 4.5rem; }
    .options-grid { gap: 8px; }
    .option-btn { padding: 11px 8px; font-size: 0.9rem; }
    .kana-grid { gap: 5px; }
    .cell-kana { font-size: 1.25rem; }
    .cell-roma { font-size: 0.55rem; }
    .kana-cell { padding: 8px 3px 6px; }
    .chart-tip { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title-jp">かなクイズ</div>
    <div class="title-kr">히라가나 · 가타카나</div>
  </header>

  <div class="page-nav">
    <button class="page-nav-btn active" onclick="switchPage('quiz')">✏️ 퀴즈</button>
    <button class="page-nav-btn" onclick="switchPage('chart')">📋 문자표</button>
  </div>

  <!-- ══ QUIZ PAGE ══ -->
  <div id="page-quiz" class="page active">
    <div style="text-align:center; margin-bottom:12px;">
      <div class="mode-bar">
        <button class="mode-btn active" onclick="setMode('hiragana')">히라가나</button>
        <button class="mode-btn" onclick="setMode('katakana')">가타카나</button>
        <button class="mode-btn" onclick="setMode('both')">혼합</button>
      </div>
      <div class="type-tabs">
        <button class="type-tab active" onclick="setType('choice')">선택형</button>
        <button class="type-tab" onclick="setType('input')">입력형</button>
      </div>
      <div class="divider">· · ·</div>
    </div>

    <div id="quizArea">
      <div class="score-bar">
        <div class="score-item">
          <span class="score-label">맞힌 수</span>
          <span class="score-value correct" id="correctCount">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">진행</span>
          <span class="score-value" id="questionNum">1 / 20</span>
        </div>
        <div class="score-item">
          <span class="score-label">틀린 수</span>
          <span class="score-value wrong" id="wrongCount">0</span>
        </div>
      </div>
      <div class="progress-wrap"><div class="progress-fill" id="progressBar" style="width:5%"></div></div>
      <div class="streak" id="streakDisplay"></div>

      <div class="quiz-card" id="quizCard">
        <span class="question-type" id="questionType">히라가나 → 읽기</span>
        <span class="question-num" id="questionNumSmall">1 / 20</span>
        <div class="kana-display" id="kanaDisplay">あ</div>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="input-wrap" id="inputWrap" style="display:none">
          <input class="answer-input" id="answerInput" type="text" placeholder="로마자로 입력 (예: a, ka, shi...)" autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="submit-btn" onclick="checkInput()">확인</button>
        </div>
        <div class="feedback" id="feedback"></div>
        <div class="word-card" id="wordCard">
          <div class="word-card-label">📖 대표 단어</div>
          <div class="word-jp" id="wordJp"></div>
          <div class="word-reading" id="wordReading"></div>
          <div class="word-meaning" id="wordMeaning"></div>
        </div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
      </div>
    </div>

    <div class="result-screen" id="resultScreen">
      <div class="result-kana">🎌</div>
      <div class="result-title" id="resultTitle">퀴즈 완료!</div>
      <div class="result-score" id="resultScore">0 / 20</div>
      <div class="result-sub" id="resultSub">수고하셨습니다!</div>
      <button class="restart-btn" onclick="restartQuiz()">다시 도전하기</button>
    </div>
  </div>

  <!-- ══ CHART PAGE ══ -->
  <div id="page-chart" class="page">
    <div class="chart-toggle">
      <button class="chart-toggle-btn active" onclick="setChart('hiragana')">히라가나 あ</button>
      <button class="chart-toggle-btn" onclick="setChart('katakana')">가타카나 ア</button>
    </div>

    <div class="chart-meta">
      <div class="legend-item">
        <div class="legend-dot" style="background:white;border:1px solid #ccc;"></div>기본 청음
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(90,122,90,0.18);border:1px solid rgba(90,122,90,0.4);"></div>탁음 (゛)
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(201,149,42,0.18);border:1px solid rgba(201,149,42,0.4);"></div>반탁음 (゜)
      </div>
      <div class="chart-tip">📌 셀 클릭 → 대표 단어 보기</div>
    </div>

    <div id="chart-hiragana" class="chart-section active">
      <div class="chart-block">
        <div class="chart-block-title">기본 모음 · 자음 <span class="badge">청음</span></div>
        <div class="kana-grid" id="grid-hira-basic"></div>
      </div>
      <div class="chart-block">
        <div class="chart-block-title">탁음 <span class="badge sage">゛</span></div>
        <div class="kana-grid" id="grid-hira-dakuten"></div>
      </div>
      <div class="chart-block">
        <div class="chart-block-title">반탁음 <span class="badge gold">゜</span></div>
        <div class="kana-grid" id="grid-hira-handakuten"></div>
      </div>
    </div>

    <div id="chart-katakana" class="chart-section">
      <div class="chart-block">
        <div class="chart-block-title">기본 모음 · 자음 <span class="badge">청음</span></div>
        <div class="kana-grid" id="grid-kata-basic"></div>
      </div>
      <div class="chart-block">

function switchPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.page-nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['quiz','chart'][i] === id);
  });
  document.getElementById('page-' + id).classList.add('active');
}

// ── CHART ──
function setChart(type) {
  document.querySelectorAll('.chart-toggle-btn').forEach((b,i) => {
    b.classList.toggle('active', ['hiragana','katakana'][i] === type);
  });
  document.querySelectorAll('.chart-section').forEach(s => s.classList.remove('active'));
  document.getElementById('chart-' + type).classList.add('active');
}

function buildGrid(id, data, cellType) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '';
  data.forEach(item => {
    const div = document.createElement('div');
    if (!item[0] || item[0].trim() === '') {
      div.className = 'kana-cell empty';
      el.appendChild(div);
      return;
    }
    const kana = item[0].trim();
    const roma = item[1];
    div.className = 'kana-cell' + (cellType==='dakuten'?' dakuten':cellType==='handakuten'?' handakuten':'');
    div.innerHTML = `<span class="cell-kana">${kana}</span><span class="cell-roma">${roma}</span>`;
    div.addEventListener('click', e => showPopup(e, kana, roma));
    el.appendChild(div);
  });
}

function showPopup(e, kana, roma) {
  const popup = document.getElementById('kanaPopup');
  const w = WORDS[kana];
  document.getElementById('popupKana').textContent = kana;
  document.getElementById('popupRoma').textContent = roma;
  if (w) {
    document.getElementById('popupWord').textContent = w[0];
    document.getElementById('popupReading').textContent = w[1];
    document.getElementById('popupMeaning').textContent = w[2];
  } else {
    document.getElementById('popupWord').textContent = '';
    document.getElementById('popupReading').textContent = '';
    document.getElementById('popupMeaning').textContent = '—';
  }
  // Render hidden to measure height
  popup.style.visibility = 'hidden';
  popup.style.top = '-9999px';
  popup.classList.add('visible');

  const rect = e.currentTarget.getBoundingClientRect();
  const pw = 180;
  const ph = popup.offsetHeight;
  const margin = 8;

  // Horizontal: center on cell, clamp within viewport
  let left = rect.left + rect.width / 2 - pw / 2;
  left = Math.max(margin, Math.min(left, window.innerWidth - pw - margin));

  // Vertical: use viewport-relative coords (fixed positioning)
  // Prefer above, fall back to below
  let top;
  if (rect.top - ph - 10 >= margin) {
    top = rect.top - ph - 10;
  } else {
    top = rect.bottom + 10;
  }
  // clamp bottom
  if (top + ph > window.innerHeight - margin) {
    top = window.innerHeight - ph - margin;
  }

  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.style.minWidth = pw + 'px';
  popup.style.visibility = 'visible';
}

document.addEventListener('click', e => {
  if (!e.target.closest('.kana-cell')) {
    document.getElementById('kanaPopup').classList.remove('visible');
  }
});

// ── QUIZ ──
let currentMode = 'hiragana', currentType = 'choice';
let questions = [], currentIdx = 0, correct = 0, wrong = 0, streak = 0, answered = false;
const TOTAL = 20;

function getPool() {
  if (currentMode==='hiragana') return HIRAGANA;
  if (currentMode==='katakana') return KATAKANA;
  return [...HIRAGANA,...KATAKANA];
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function setMode(m) {
  currentMode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',['hiragana','katakana','both'][i]===m));
  restartQuiz();
}

function setType(t) {
  currentType=t;
  document.querySelectorAll('.type-tab').forEach((b,i)=>b.classList.toggle('active',['choice','input'][i]===t));
  restartQuiz();
}

function buildQuestions() { questions=shuffle(getPool()).slice(0,TOTAL); }

function renderQuestion() {
  const q=questions[currentIdx];
  const isHira=HIRAGANA.some(h=>h.kana===q.kana);
  document.getElementById('questionType').textContent=isHira?'히라가나 → 읽기':'가타카나 → 읽기';
  document.getElementById('questionNumSmall').textContent=`${currentIdx+1} / ${TOTAL}`;
  document.getElementById('questionNum').textContent=`${currentIdx+1} / ${TOTAL}`;
  document.getElementById('kanaDisplay').textContent=q.kana;
  document.getElementById('kanaDisplay').classList.remove('shake');
  document.getElementById('progressBar').style.width=`${(currentIdx/TOTAL)*100}%`;
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('wordCard').classList.remove('show');
  answered=false;

  if (currentType==='choice') {
    document.getElementById('optionsGrid').style.display='grid';
    document.getElementById('inputWrap').style.display='none';
    const choices=shuffle([q,...shuffle(getPool().filter(x=>x.roma!==q.roma)).slice(0,3)]);
    const grid=document.getElementById('optionsGrid');
    grid.innerHTML='';
    choices.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='option-btn';
      btn.textContent=c.roma;
      btn.onclick=()=>checkChoice(btn,c.roma,q.roma,q.kana);
      grid.appendChild(btn);
    });
  } else {
    document.getElementById('optionsGrid').style.display='none';
    document.getElementById('inputWrap').style.display='flex';
    const inp=document.getElementById('answerInput');
    inp.value=''; inp.className='answer-input'; inp.disabled=false; inp.focus();
  }
}

function showWordCard(kana) {
  const w=WORDS[kana]; if(!w) return;
  document.getElementById('wordJp').textContent=w[0];
  document.getElementById('wordReading').textContent=w[1];
  document.getElementById('wordMeaning').textContent=w[2];
  document.getElementById('wordCard').classList.add('show');
}

function checkChoice(btn,selected,correctRoma,kana) {
  if(answered) return; answered=true;
  document.querySelectorAll('.option-btn').forEach(b=>{b.disabled=true;if(b.textContent===correctRoma)b.classList.add('correct');});
  const fb=document.getElementById('feedback');
  if(selected===correctRoma){
    btn.classList.add('correct'); addCorrect();
    fb.textContent='✓ 정답입니다!'; fb.className='feedback show correct-fb';
    showWordCard(kana);
  } else {
    btn.classList.add('wrong'); addWrong();
    fb.textContent=`✗ 정답은 「${correctRoma}」입니다`; fb.className='feedback show wrong-fb';
    document.getElementById('kanaDisplay').classList.add('shake');
  }
  document.getElementById('nextBtn').classList.add('show');
}

function checkInput() {
  if(answered) return;
  const inp=document.getElementById('answerInput');
  const val=inp.value.trim().toLowerCase(); if(!val) return;
  answered=true;
  const q=questions[currentIdx];
  const alts={'shi':['si'],'chi':['ti'],'tsu':['tu'],'fu':['hu'],'ji':['zi','di'],'zu':['du'],'wo':['o']};
  const accepts=[q.roma,...(alts[q.roma]||[])];
  const fb=document.getElementById('feedback');
  inp.disabled=true;
  if(accepts.includes(val)){
    inp.className='answer-input correct'; addCorrect();
    fb.textContent='✓ 정답입니다!'; fb.className='feedback show correct-fb';
    showWordCard(q.kana);
  } else {
    inp.className='answer-input wrong'; addWrong();
    fb.textContent=`✗ 정답은 「${q.roma}」입니다`; fb.className='feedback show wrong-fb';
    document.getElementById('kanaDisplay').classList.add('shake');
  }
  document.getElementById('nextBtn').classList.add('show');
}

function addCorrect(){
  correct++; streak++;
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('streakDisplay').textContent=streak>=3?`🔥 ${streak}연속 정답!`:'';
}
function addWrong(){
  wrong++; streak=0;
  document.getElementById('wrongCount').textContent=wrong;
  document.getElementById('streakDisplay').textContent='';
}

function nextQuestion(){
  currentIdx++;
  if(currentIdx>=TOTAL){showResult();return;}
  const card=document.getElementById('quizCard');
  card.style.animation='none';
  setTimeout(()=>{card.style.animation='slideIn 0.3s ease';renderQuestion();},10);
}

function showResult(){
  document.getElementById('quizArea').style.display='none';
  document.getElementById('resultScreen').classList.add('show');
  const pct=Math.round((correct/TOTAL)*100);
  document.getElementById('resultScore').textContent=`${correct} / ${TOTAL}`;
  let title,sub;
  if(pct===100){title='완벽합니다! 🎌';sub='모든 문자를 완벽하게 맞히셨어요!';}
  else if(pct>=80){title='훌륭해요! ✨';sub=`정확도 ${pct}% — 거의 다 외우셨네요!`;}
  else if(pct>=60){title='잘했어요! 👍';sub=`정확도 ${pct}% — 꾸준히 연습하면 금방 외울 거예요!`;}
  else{title='계속 연습해요! 💪';sub=`정확도 ${pct}% — 반복이 실력을 만들어요!`;}
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultSub').textContent=sub;
}

function restartQuiz(){
  currentIdx=0;correct=0;wrong=0;streak=0;
  document.getElementById('correctCount').textContent=0;
  document.getElementById('wrongCount').textContent=0;
  document.getElementById('streakDisplay').textContent='';
  document.getElementById('quizArea').style.display='block';
  document.getElementById('resultScreen').classList.remove('show');
  buildQuestions(); renderQuestion();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(currentType==='input'&&!answered) checkInput();
    else if(answered) nextQuestion();
  }
});

// Init
buildGrid('grid-hira-basic', HIRA_BASIC, 'basic');
buildGrid('grid-hira-dakuten', HIRA_DAKUTEN, 'dakuten');
buildGrid('grid-hira-handakuten', HIRA_HANDAKUTEN, 'handakuten');
buildGrid('grid-kata-basic', KATA_BASIC, 'basic');
buildGrid('grid-kata-dakuten', KATA_DAKUTEN, 'dakuten');
buildGrid('grid-kata-handakuten', KATA_HANDAKUTEN, 'handakuten');
buildQuestions();
renderQuestion();
</script>
